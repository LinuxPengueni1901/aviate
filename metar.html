<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviate // METAR Decoder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="grid-container">
        <nav class="panel-sidebar">
            <h2>Aviate Systems</h2>
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="cockpit.html">Kokpit Okuryazarlığı</a></li>
                <li><a href="metar.html" class="active">METAR Çözücü</a></li>
                <li><a href="radio.html">Telsiz Jargonu</a></li>
            </ul>
        </nav>

        <main class="panel-main">
            <h1>METAR Kod Çözücü</h1>
            <p class="subtitle">Yerel dize ayrıştırma motoru.</p>
            
            <div class="input-group">
                <label for="metar-input">Ham Veri Girişi</label>
                <input type="text" id="metar-input" value="LTFM 251230Z 18012KT CAVOK">
            </div>
            <button class="btn-launch" id="btn-decode">İşle</button>

            <section id="metar-result" class="info-box" style="display: none;">
                <h2>Ayrıştırılmış Çıktı Matrisi</h2>
                <div class="data-table">
                    <div class="table-row"><span class="table-label">İstasyon ICAO</span><span class="table-value" id="out-icao"></span></div>
                    <div class="table-row"><span class="table-label">Zaman Damgası</span><span class="table-value" id="out-time"></span></div>
                    <div class="table-row"><span class="table-label">Rüzgar Vektörü</span><span class="table-value" id="out-wind"></span></div>
                    <div class="table-row"><span class="table-label">Görüş Limiti</span><span class="table-value" id="out-cond"></span></div>
                </div>
            </section>
        </main>
    </div>

<script>
    document.getElementById("btn-decode").addEventListener("click", function() {
        const raw = document.getElementById("metar-input").value.trim();
        if(!raw) return;
        
        // Önce tüm kelimeleri (token) ayıralım
        const tokens = raw.split(/\s+/); 
        
        // Sonuç matrisimizin varsayılan değerleri
        let result = {
            icao: tokens[0] || "N/A",
            time: "N/A",
            wind: "Sakin (Calm)",
            vis: "Belirtilmedi",
            weather: "Açık / Raporlanmadı",
            clouds: "Açık Gökyüzü (SKC/CLR)",
            tempDew: "N/A",
            altimeter: "N/A"
        };

        // Bulut tip tanımlamaları sözlüğü
        const cloudTypes = {
            FEW: "Az Bulutlu (1/8 - 2/8)",
            SCT: "Parçalı Bulutlu (3/8 - 4/8)",
            BKN: "Çok Bulutlu (5/8 - 7/8)",
            OVC: "Kapalı (8/8)",
            VV: "Dikey Görüş (Sis/Pus)"
        };

        // Hava olayı tanımlamaları sözlüğü
        const weatherDescriptors = {
            "-RA": "Hafif Yağmurlu", "RA": "Yağmurlu", "+RA": "Şiddetli Yağmurlu",
            "-SN": "Hafif Karlı", "SN": "Karlı", "+SN": "Şiddetli Karlı",
            "TS": "Gökgürültülü Sağanak", "TSRA": "Gökgürültülü Fırtına ve Yağmur",
            "BR": "Puslu (Mist)", "FG": "Sisli (Fog)", "HZ": "Kuru Pus (Haze)",
            "DZ": "Çiseleyen Yağmur", "SHRA": "Sağanak Yağışlı"
        };

        tokens.forEach(token => {
            // 1. Zaman Damgası (Örn: 251230Z)
            if(/^([0-9]{2})([0-9]{4})Z$/.test(token)) {
                const match = token.match(/^([0-9]{2})([0-9]{4})Z$/);
                result.time = `Ayın ${match[1]}. Günü // Saat: ${match[2].substring(0,2)}:${match[2].substring(2,4)} UTC`;
            }
            
            // 2. Rüzgar Kombinasyonları (Standart, Hamleli/Gust, Değişken yönlü VRB)
            // Örn: 18012KT, 23018G25KT, VRB03KT
            if(token.endsWith("KT")) {
                if(token.startsWith("VRB")) {
                    const speed = token.replace("VRB", "").replace("KT", "");
                    result.wind = `Değişken Yönlerden ${speed} Knot`;
                } else {
                    const match = token.match(/^([0-9]{3})([0-9]{2})(G[0-9]{2})?KT$/);
                    if(match) {
                        let baseWind = `${match[1]}° Yönünden ${match[2]} Knot`;
                        if(match[3]) { // Eğer Gust (Hamle) varsa
                            const gustSpeed = match[3].replace("G", "");
                            baseWind += ` (Hamle: ${gustSpeed} Knot)`;
                        }
                        result.wind = baseWind;
                    }
                }
            }
            // Değişken yön aralığı (Örn: 140V220)
            if(/^([0-9]{3})V([0-9]{3})$/.test(token)) {
                const match = token.match(/^([0-9]{3})V([0-9]{3})$/);
                result.wind += ` (${match[1]}° ile ${match[2]}° arasında değişken)`;
            }

            // 3. Görüş ve CAVOK Durumu
            if(token === "CAVOK") {
                result.vis = "10 KM veya üzeri (Bulut yok, hava açık)";
                result.clouds = "Bulut Katmanı Yok (CAVOK)";
            }
            // Metrik Görüş (Örn: 9999, 4000, 0500)
            if(/^([0-9]{4})$/.test(token) && token !== "9999") {
                result.vis = `${parseInt(token)} Metre`;
            } else if(token === "9999") {
                result.vis = "10 KM veya üzeri";
            }
            // Amerikan Tarzı Görüş (Örn: 2SM, 1/2SM)
            if(token.endsWith("SM")) {
                result.vis = `${token.replace("SM", "")} Statü Mili`;
            }

            // 4. Hava Olayları (Weather Phenomena)
            if(weatherDescriptors[token]) {
                result.weather = weatherDescriptors[token];
            }

            // 5. Bulut Katmanları (Örn: FEW030, BKN015, VV002)
            if(/^([A-Z]{2,3})([0-9]{3})/.test(token)) {
                const match = token.match(/^([A-Z]{2,3})([0-9]{3})/);
                if(cloudTypes[match[1]]) {
                    const height = parseInt(match[2]) * 100; // Feet cinsine çeviriyoruz
                    result.clouds = `${cloudTypes[match[1]]} - Tabandaki Yükseklik: ${height} feet`;
                }
            }

            // 6. Sıcaklık ve İşba Noktası (Örn: 15/10, M02/M05)
            if(/^([M0-9]{2})\/([M0-9]{2})$/.test(token)) {
                const match = token.match(/^([M0-9]{2})\/([M0-9]{2})$/);
                let t = match[1].startsWith("M") ? `-${match[1].replace("M", "")}` : match[1];
                let d = match[2].startsWith("M") ? `-${match[2].replace("M", "")}` : match[2];
                result.tempDew = `Hava Sıcaklığı: ${t}°C / İşba Noktası (Dewpoint): ${d}°C`;
            }

            // 7. Altimetre / Basınç Değeri (Örn: Q1013, A2992)
            if(/^Q([0-9]{4})$/.test(token)) {
                result.altimeter = `${token.replace("Q", "")} hPa (QNH)`;
            } else if(/^A([0-9]{4})$/.test(token)) {
                const val = token.replace("A", "");
                result.altimeter = `${val.substring(0,2)}.${val.substring(2,4)} inHg`;
            }
        });

        // HTML Arayüzüne Yazdırma (UI Güncellemesi)
        // Mevcut HTML elementlerini kullanıyoruz, yenilerini de ekledik.
        document.getElementById("out-icao").innerText = result.icao;
        document.getElementById("out-time").innerText = result.time;
        document.getElementById("out-wind").innerText = result.wind;
        
        // Eğer HTML tablonu genişletmek istersen diye buraya ekstra alanlar koyuyorum.
        // Mevcut HTML'de kalması için şimdilik 'Görüş Limiti' alanına birleştirilmiş veri basalım:
        document.getElementById("out-cond").innerHTML = `
            <strong>Görüş:</strong> ${result.vis} <br>
            <strong>Hava Olayı:</strong> ${result.weather} <br>
            <strong>Bulutluluk:</strong> ${result.clouds} <br>
            <strong>Sıcaklık:</strong> ${result.tempDew} <br>
            <strong>Altimetre:</strong> ${result.altimeter}
        `;
        
        document.getElementById("metar-result").style.display = "block";
    });
</script>

</body>
</html>
