<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviate // METAR Decoder</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .lang-switcher { display: flex; gap: 5px; margin-bottom: 30px; padding: 0 12px; }
        .btn-lang { background-color: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; font-family: inherit; font-size: 11px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
        .btn-lang.active-lang { border-color: var(--accent); color: #FFF; background-color: var(--surface); }
    </style>
</head>
<body>

    <div class="grid-container">
        <nav class="panel-sidebar">
            <h2>Aviate Systems</h2>
            <div class="lang-switcher">
                <button class="btn-lang" onclick="setLanguage('tr')" id="btn-tr">TR</button>
                <button class="btn-lang active-lang" onclick="setLanguage('en')" id="btn-en">EN</button>
            </div>
            <ul>
                <li><a href="index.html" class="i18n" data-en="Dashboard" data-tr="Dashboard">Dashboard</a></li>
                <li><a href="cockpit.html" class="i18n" data-en="Cockpit Literacy" data-tr="Kokpit Okuryazarlığı">Cockpit Literacy</a></li>
                <li><a href="metar.html" class="active i18n" data-en="METAR Decoder" data-tr="METAR Çözücü">METAR Decoder</a></li>
                <li><a href="radio.html" class="i18n" data-en="Radio Jargon" data-tr="Telsiz Jargonu">Radio Jargon</a></li>
                <li><a href="numbers.html" class="i18n" data-en="Number Pronunciations" data-tr="Sayı Telaffuzları">Number Pronunciations</a></li>
                <li><a href="quiz.html" class="i18n" data-en="Training Quiz" data-tr="Eğitim Quizi">Training Quiz</a></li>
                <li><a href="dictionary.html" class="i18n" data-en="System Dictionary" data-tr="Sistem Sözlüğü">System Dictionary</a></li>
            </ul>
        </nav>

        <main class="panel-main">
            <h1 class="i18n" data-en="METAR Decoder" data-tr="METAR Kod Çözücü">METAR Decoder</h1>
            <p class="subtitle i18n" data-en="Local parsing engine for aviation weather reports." data-tr="Yerel dize ayrıştırma motoruyla hava durumu raporu analizi.">Local parsing engine for aviation weather reports.</p>
            
            <div class="input-group">
                <label for="metar-input" class="i18n" data-en="Raw Data Input" data-tr="Ham Veri Girişi">Raw Data Input</label>
                <input type="text" id="metar-input" value="LTFM 251230Z 18012KT CAVOK">
            </div>
            <button class="btn-launch i18n" data-en="Decode" data-tr="İşle" id="btn-decode">Decode</button>

            <section id="metar-result" class="info-box" style="display: none; margin-top: 40px;">
                <h2 class="i18n" data-en="METAR Analysis Report" data-tr="METAR Analiz Raporu">METAR Analysis Report</h2>
                <div class="data-table" style="margin-top: 15px;">
                    <div class="table-row">
                        <span class="table-label" id="lbl-icao">Station ICAO</span>
                        <span class="table-value" id="out-icao"></span>
                    </div>
                    <div class="table-row">
                        <span class="table-label" id="lbl-time">Report Time</span>
                        <span class="table-value" id="out-time"></span>
                    </div>
                    <div class="table-row">
                        <span class="table-label" id="lbl-wind">Wind Vector</span>
                        <span class="table-value" id="out-wind"></span>
                    </div>
                    <div class="table-row">
                        <span class="table-label" id="lbl-cond">Visibility & Clouds</span>
                        <span class="table-value" id="out-cond"></span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let currentLang = 'en';
        let globalRawData = "";

        const cloudTypes = {
            en: { FEW: "Few Clouds", SCT: "Scattered", BKN: "Broken", OVC: "Overcast", VV: "Vertical Visibility" },
            tr: { FEW: "Az Bulutlu", SCT: "Parçalı Bulutlu", BKN: "Çok Bulutlu", OVC: "Kapalı", VV: "Dikey Görüş" }
        };

        const weatherDesc = {
            en: { "-RA": "Light Rain", "RA": "Rain", "+RA": "Heavy Rain", "-SN": "Light Snow", "SN": "Snow", "TSRA": "Thunderstorm & Rain", "BR": "Mist", "FG": "Fog", "HZ": "Haze" },
            tr: { "-RA": "Hafif Yağmurlu", "RA": "Yağmurlu", "+RA": "Şiddetli Yağmurlu", "-SN": "Hafif Karlı", "SN": "Karlı", "TSRA": "Gökgürültülü Fırtına ve Yağmur", "BR": "Puslu", "FG": "Sisli", "HZ": "Kuru Pus" }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById("btn-tr").classList.remove("active-lang");
            document.getElementById("btn-en").classList.remove("active-lang");
            document.getElementById("btn-" + lang).classList.add("active-lang");
            
            const elements = document.querySelectorAll('.i18n');
            elements.forEach(el => {
                const translation = el.getAttribute('data-' + lang);
                if (translation) el.innerText = translation;
            });

            document.getElementById("lbl-icao").innerText = lang === 'en' ? "Station ICAO" : "İstasyon (ICAO Kod)";
            document.getElementById("lbl-time").innerText = lang === 'en' ? "Report Time" : "Rapor Zamanı";
            document.getElementById("lbl-wind").innerText = lang === 'en' ? "Wind Vector" : "Rüzgar Durumu";
            document.getElementById("lbl-cond").innerText = lang === 'en' ? "Visibility & Clouds" : "Görüş & Hava Detayları";

            if(globalRawData) runDecoder(globalRawData);
        }

        document.getElementById("btn-decode").addEventListener("click", function() {
            globalRawData = document.getElementById("metar-input").value.trim();
            runDecoder(globalRawData);
        });

        function runDecoder(raw) {
            if(!raw) return;
            const tokens = raw.split(/\s+/);
            let res = { icao: tokens[0], time: "N/A", wind: "Calm / Sakin", vis: "N/A", clouds: "Clear / Açık", weather: "None" };

            tokens.forEach(token => {
                if(/^([0-9]{2})([0-9]{4})Z$/.test(token)) {
                    const match = token.match(/^([0-9]{2})([0-9]{4})Z$/);
                    res.time = currentLang === 'en' ? `Day ${match[1]} // Time: ${match[2].substring(0,2)}:${match[2].substring(2,4)} UTC` : `Ayın ${match[1]}. Günü // Saat: ${match[2].substring(0,2)}:${match[2].substring(2,4)} UTC`;
                }
                if(token.endsWith("KT")) {
                    if(token.startsWith("VRB")) {
                        res.wind = currentLang === 'en' ? `Variable at ${token.replace("VRB","").replace("KT","")} Knots` : `Değişken Yönlerden ${token.replace("VRB","").replace("KT","")} Knot`;
                    } else {
                        const match = token.match(/^([0-9]{3})([0-9]{2})(G[0-9]{2})?KT$/);
                        if(match) {
                            res.wind = currentLang === 'en' ? `${match[2]} Knots from ${match[1]}°` : `${match[1]}° Yönünden ${match[2]} Knot`;
                            if(match[3]) res.wind += currentLang === 'en' ? ` (Gusts: ${match[3].replace("G","")} KT)` : ` (Hamle: ${match[3].replace("G","")} KT)`;
                        }
                    }
                }
                if(token === "CAVOK") {
                    res.vis = currentLang === 'en' ? "10 KM or more" : "10 KM veya üzeri";
                    res.clouds = currentLang === 'en' ? "No clouds below 5000ft" : "Bulut Katmanı Yok";
                }
                if(/^([0-9]{4})$/.test(token) && token !== "9999") {
                    res.vis = `${parseInt(token)} Metre`;
                } else if(token === "9999") {
                    res.vis = currentLang === 'en' ? "10 KM or more" : "10 KM veya üzeri";
                }
                if(weatherDesc[currentLang][token]) {
                    res.weather = weatherDesc[currentLang][token];
                }
                if(/^([A-Z]{2,3})([0-9]{3})/.test(token)) {
                    const match = token.match(/^([A-Z]{2,3})([0-9]{3})/);
                    if(cloudTypes[currentLang][match[1]]) {
                        res.clouds = currentLang === 'en' ? `${cloudTypes['en'][match[1]]} at ${parseInt(match[2])*100} feet` : `${cloudTypes['tr'][match[1]]} // Taban: ${parseInt(match[2])*100} Feet`;
                    }
                }
            });

            document.getElementById("out-icao").innerText = res.icao;
            document.getElementById("out-time").innerText = res.time;
            document.getElementById("out-wind").innerText = res.wind;
            document.getElementById("out-cond").innerHTML = currentLang === 'en' ? 
                `<strong>Visibility:</strong> ${res.vis} <br><strong>Weather:</strong> ${res.weather} <br><strong>Clouds:</strong> ${res.clouds}` : 
                `<strong>Görüş:</strong> ${res.vis} <br><strong>Hava Olayı:</strong> ${res.weather} <br><strong>Bulutluluk:</strong> ${res.clouds}`;
            
            document.getElementById("metar-result").style.display = "block";
        }

        window.onload = function() { setLanguage('en'); };
    </script>
</body>
</html>
